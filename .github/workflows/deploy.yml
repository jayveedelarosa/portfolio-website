name: Deploy to S3

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::651323680251:role/github-deploy-role
          aws-region: ap-southeast-1

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://jayveedelarosa.dev \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1HT6ILG1TI38P \
            --paths "/*"